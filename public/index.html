<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MPESA STK Push Payment</title>
    <!-- Tailwind CSS for styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .loader {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #3498db;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body class="bg-gray-100 flex items-center justify-center min-h-screen">

    <div class="bg-white p-8 rounded-lg shadow-md w-full max-w-md">
        <h2 class="text-2xl font-bold mb-6 text-center text-green-600">Lipa na M-PESA</h2>

        <form id="paymentForm" class="space-y-4">
            <div>
                <label for="phone" class="block text-sm font-medium text-gray-700">Phone Number (e.g. 0712345678 or 254...)</label>
                <input type="text" id="phone" name="phone" required class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-green-500 focus:border-green-500 sm:text-sm">
            </div>

            <div>
                <label for="amount" class="block text-sm font-medium text-gray-700">Amount (KES)</label>
                <input type="number" id="amount" name="amount" min="1" required class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-green-500 focus:border-green-500 sm:text-sm">
            </div>

            <input type="hidden" id="accountReference" value="PAYMENT_TEST">

            <button type="submit" id="submitBtn" class="w-full flex justify-center py-2 px-4 border border-transparent rounded-md shadow-sm text-sm font-medium text-white bg-green-600 hover:bg-green-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-green-500">
                Pay Now
            </button>
        </form>

        <div id="statusContainer" class="hidden mt-6 flex flex-col items-center">
            <div id="loader" class="loader mb-2"></div>
            <p id="statusMessage" class="text-sm font-medium text-gray-700 text-center">Waiting for payment on phone...</p>
        </div>

        <div id="resultContainer" class="hidden mt-6 p-4 rounded-md">
            <p id="resultMessage" class="text-sm font-medium text-center"></p>
            <p id="receiptNumber" class="text-sm font-medium text-center mt-2 hidden"></p>
            <button id="resetBtn" class="mt-4 w-full flex justify-center py-2 px-4 border border-gray-300 rounded-md shadow-sm text-sm font-medium text-gray-700 bg-white hover:bg-gray-50">
                Make Another Payment
            </button>
        </div>
    </div>

    <script src="/js/app.js"></script>
</body>
</html>
